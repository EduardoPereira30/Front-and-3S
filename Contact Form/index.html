<!DOCTYPE html>
<html lang="PT-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de contatos</title>
    <link rel="stylesheet" href="./css/style.css">
    <!-- <link rel="stylesheet" href="./js/script.js"> -->

</head>

<body>
    <header class="form--header">
        <div class="container conteiner--flex">
            <img class="form--header__img-perfil" src="./imagens/Vector.svg" alt="">
            <h1 class="form--header__Titulo">Contact Form</h1>
            <p class="form--header__Text">Insira os dados do contato e clique em cadastrar!</p>
        </div>
    </header>
    <main>
        <div class="container">
            <form class="form-contact" action="">
                <div class="form-contact__linha">
                    <div class="form-contact__col-a"><label class="form-contact__label" for="">Nome</label></div>
                    <div class="form-contact__col-b">
                        <input class="form-contact__input form-contact__metade" type="text" id="Nome" name="Nome"
                            placeholder="Nome">
                        <input type="text" class="form-contact__input form-contact__metade" id="Sobrenome"
                            name="Sobrenome" placeholder="Sobrenome">
                    </div>
                </div>


                <div class="form-contact__linha">
                    <div class="form-contact__col-a"><label class="form-contact__label" for="">Email</label></div>
                    <div class="form-contact__col-b">
                        <input class="form-contact__input form-contact__inteiro" type="text" id="Email" name="Email"
                            placeholder="Ex: fulano@email.com">

                    </div>
                </div>



                <div class="form-contact__linha">
                    <div class="form-contact__col-a"><label class="form-contact__label" for="">Telefone</label>
                    </div>
                    <div class="form-contact__col-b">
                        <input class="form-contact__input form-contact__treco" type="text" id="NEstado" name="NEstado"
                            placeholder="+55">
                        <input class="form-contact__input form-contact__treco" type="text" id="DDD" name="Email"
                            placeholder="DDD">
                        <input class="form-contact__input form-contact__treco" type="Telefone" id="Telefone"
                            name="Telefone" placeholder="99999-9999">

                    </div>
                </div>

                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" form="">Endereco</label>
                    </div>

                    <div class="form-contact__col-b">
                        <input class="form-contact__input form-contact__quarto" type="text" id="Cep" name="Cep"
                            placeholder="Cep" maxlength="8" onblur="BuscarEndereco(this.value)">
                        <input class="form-contact__input form-contact__metade" type="text" id="Rua"
                            name="Rua de lá casa" placeholder="Rua de lá casa">
                        <input class="form-contact__input form-contact__quarto" type="text" id="Compremento"
                            name="Compremento" placeholder="Compremento">
                    </div>
                </div>

                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" form=""></label>
                    </div>

                    <div class="form-contact__col-b">
                        <input class="form-contact__input form-contact__treco" type="tex" id="Apartamento"
                            name="Apto. 12 Bloco X" placeholder="Apto. 12 Bloco X">
                        <input class="form-contact__input form-contact__treco" type="tex" id="Bairro" name="Bairro"
                            placeholder="Bairro">
                        <input class="form-contact__input form-contact__treco" type="tex" id="Cidade" name="Cidade"
                            placeholder="Cidade">
                    </div>
                </div>

                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" form=""></label>
                    </div>

                    <div class="form-contact__col-b">
                        <input class="form-contact__input form-contact__treco" type="tex" id="Estado" name="Estado"
                            placeholder="Estado">
                    </div>
                </div>

                <div class="form-contact__linha form-contact__col-anotacao">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" form="">Anotações</label>
                    </div>

                    <div class="form-contact__col-b">
                        <textarea class="form-contact__input form-contact__inteiro form-contact____anotacoes" type="tex"
                            id="Anotacoes" name="Suas anotações aqui..."
                            placeholder="Suas anotações aqui..."></textarea>
                    </div>
                </div>
                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" form=""></label>
                    </div>

                    <div class="form-contact__col-b form-contact__col-b-button">
                        <button type="button" class="button cadastrar" onclick="validarFormulario()">Cadastrar</button>
                        <Button type="reset" class="button">Limpar</Button>
                    </div>
                </div>

            </form>
        </div>
    </main>
    <footer>
        Todos os direitos reservados
    </footer>

    <script src="./js/script.js"></script>
</body>

</html>
