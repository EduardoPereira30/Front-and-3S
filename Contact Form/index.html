<!DOCTYPE html>
<html lang="PT-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de contatos</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <header class="form--header">
        <div class="container conteiner--flex">
            <img class="form--header__img-perfil" src="./imagens/Vector.svg" alt="">
            <h1 class="form--header__Titulo">Contact Form</h1>
            <p class="form--header__Text">Insira os dados do contato e clique em cadastrar!</p>
        </div>
    </header>
    <main>
        <div class="container">
            <form class="form-contact" action="">
                <div class="form-contact__linha">
                    <div class="form-contact__col-a"><label class="form-contact__label" for="">Nome</label></div>
                    <div class="form-contact__col-b">
                        <input class="form-contact__input form-contact__metade" type="text" id="nome" name="nome"
                            placeholder="Nome">
                        <input type="text" class="form-contact__input form-contact__metade" id="Sobrenome"
                            name="Sobrenome" placeholder="Sobrenome">
                    </div>
                </div>


                <div class="form-contact__linha">
                    <div class="form-contact__col-a"><label class="form-contact__label" for="">Email</label></div>
                    <div class="form-contact__col-b">
                        <input class="form-contact__input form-contact__inteiro" type="text" id="Email" name="Email"
                            placeholder="Ex: fulano@email.com">

                    </div>
                </div>



                <div class="form-contact__linha">
                    <div class="form-contact__col-a"><label class="form-contact__label" for="">Telefone</label>
                    </div>
                    <div class="form-contact__col-b">
                        <input class="form-contact__input" type="text" id="" name="Email" placeholder="+55">
                        <input class="form-contact__input" type="text" id="DDD" name="Email" placeholder="DDD">
                        <input class="form-contact__input" type="number" id="Telefone" name="Email"
                            placeholder="99999-9999">

                    </div>
                </div>
            </form>
        </div>
    </main>
    <footer>
        Todos os direitos reservados
    </footer>

</body>

</html>
